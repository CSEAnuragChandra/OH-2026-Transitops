services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: transitops-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      AUTH_SECRET: 4f3befff-921c-40a1-b8e7-2a6660c5e9bef54474c3-b3b9-4028-ba2e-790fe747cfd6
      AUTH_TRUST_HOST: "true"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://transitops:transitops@postgres:5432/transitops?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: transitops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: transitops
      POSTGRES_DB: transitops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U transitops -d transitops
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
